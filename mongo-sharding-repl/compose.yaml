services:

# сервер конфигурации
  configSrv1:
    image: dh-mirror.gitverse.ru/mongo:latest # docker образ
    container_name: configSrv1 
    restart: always
    ports:
      - "27017:27017"
    networks:
      app-network:
        ipv4_address: 173.17.0.10
    volumes:
      - config1-data:/data/db
    command:
      [
        "--configsvr",  # запуск в режиме конфигурации
        "--replSet",
        "config_server",
        "--bind_ip_all",
        "--port",
        "27017"
      ] 
    healthcheck:
      test: [ "CMD", "mongo", "--eval", "db.adminCommand('ping')" ]
      interval: 5s
      start_period: 10s

  configSrv2:
    image: dh-mirror.gitverse.ru/mongo:latest # docker образ
    container_name: configSrv2
    restart: always
    ports:
      - "27018:27017"
    networks:
      app-network:
        ipv4_address: 173.17.0.11
    volumes:
      - config2-data:/data/db
    command:
      [
        "--configsvr",  # запуск в режиме конфигурации
