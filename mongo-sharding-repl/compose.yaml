name: mongo-sharding-repl
services:
  configSrv:
    image: mongo:latest
    container_name: configSrv
    restart: always
    ports:
      - "27017:27017"
    networks:
      app-network:
    volumes:
      - config-data:/data/db
    command:
      [ "--configsvr","--replSet","config_server","--bind_ip_all","--port","27017" ]
    healthcheck:
      test: echo 'db.adminCommand('ping').ok' | mongosh --quiet
      interval: 5s
      timeout: 3s
      retries: 30
  shard1-1:
    image: mongo:latest
    container_name: shard1-1
    restart: always
    networks:
      app-network:
    volumes:
      - shard1-1-data:/data/db
    command:
      [ "--shardsvr","--replSet","shard1","--bind_ip_all","--port","27018" ]
    healthcheck:
      test: echo 'db.adminCommand('ping').ok' | mongosh localhost:27018/test --quiet
      interval: 5s
      timeout: 3s
      retries: 30
      start_period: 10s
    depends_on:
      - configSrv
  shard1-2:
    image: mongo:latest
    container_name: shard1-2
    restart: always
    networks:
      app-network:
    volumes:
      - shard1-2-data:/data/db
    command:
      [ "--shardsvr","--replSet","shard1","--bind_ip_all","--port","27018" ]
    healthcheck:
      test: echo 'db.adminCommand('ping').ok' | mongosh localhost:27018/test --quiet
      interval: 5s
      timeout: 3s
      retries: 30
      start_period: 10s
    depends_on:
      - configSrv
  shard1-3:
    image: mongo:latest
    container_name: shard1-3
    restart: always
    networks:
      app-network:
    volumes:
      - shard1-3-data:/data/db
    command:
      [ "--shardsvr","--replSet","shard1","--bind_ip_all","--port","27018" ]
    healthcheck:
      test: echo 'db.adminCommand('ping').ok' | mongosh localhost:27018/test --quiet
      interval: 5s
      timeout: 3s
      retries: 30
      start_period: 10s
    depends_on:
      - configSrv
  shard2-1:
    image: mongo:latest
    container_name: shard2-1
    restart: always
    networks:
      app-network:
    volumes:
      - shard2-1-data:/data/db
    command:
      [ "--shardsvr","--replSet","shard2","--bind_ip_all","--port","27019" ]
    healthcheck:
      test: echo 'db.adminCommand('ping').ok' | mongosh localhost:27019/test --quiet
      interval: 5s
      timeout: 3s
      retries: 30
      start_period: 10s
  shard2-2:
    image: mongo:latest
    container_name: shard2-2
    restart: always
    networks:
      app-network:
    volumes:
      - shard2-2-data:/data/db
    command:
      [ "--shardsvr","--replSet","shard2","--bind_ip_all","--port","27019" ]
    healthcheck:
      test: echo 'db.adminCommand('ping').ok' | mongosh localhost:27019/test --quiet
      interval: 5s
      timeout: 3s
      retries: 30
      start_period: 10s
  shard2-3:
    image: mongo:latest
    container_name: shard2-3
    restart: always
    networks:
      app-network:
    volumes:
      - shard2-3-data:/data/db
    command:
      [ "--shardsvr","--replSet","shard2","--bind_ip_all","--port","27019" ]
    healthcheck:
      test: echo 'db.adminCommand('ping').ok' | mongosh localhost:27019/test --quiet
      interval: 5s
      timeout: 3s
      retries: 30
      start_period: 10s
  mongos_router:
    image: mongo:latest
    container_name: mongos_router
    restart: always
    ports:
      - "27020:27020"
    networks:
      app-network:
    command:
      [ "mongos","--configdb","config_server/configSrv:27017","--bind_ip_all","--port","27020" ]
    healthcheck:
      test: echo 'db.adminCommand('ping').ok' | mongosh localhost:27020/test --quiet
      interval: 5s
      timeout: 3s
      retries: 30
      start_period: 10s
  pymongo_api:
    container_name: pymongo_api
    build:
      context: api_app
      dockerfile: Dockerfile
    depends_on:
      - mongos_router
    ports:
      - "8080:8080"
    environment:
      MONGODB_URL: "mongodb://mongos_router:27020"
      MONGODB_DATABASE_NAME: "somedb"
    networks:
      app-network:
volumes:
  config-data:
  shard1-1-data:
  shard1-2-data:
  shard1-3-data:
  shard2-1-data:
  shard2-2-data:
  shard2-3-data:
networks:
  app-network:
    driver: bridge
