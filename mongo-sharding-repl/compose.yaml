services:
  config-srv-repl:
    image: dh-mirror.gitverse.ru/mongo:latest
    container_name: config-srv-repl
    restart: always
    ports:
      - "27017:27017"
    networks:
      app-repl-network:
        ipv4_address: 173.18.0.8
    volumes:
      - config-data:/data/db
    command:
      [
        "--configsvr",
        "--replSet",
        "config_server",
        "--bind_ip_all",
        "--port",
        "27017"
      ] 
    healthcheck:
      test: [ "CMD", "mongo", "--eval", "db.adminCommand('ping')" ]
      interval: 5s
      start_period: 10s
  
  router1-repl:
    image: dh-mirror.gitverse.ru/mongo:latest
    container_name: router1-repl
    restart: always
    ports:
      - "27018:27018"
    networks:
      app-repl-network:
        ipv4_address: 173.18.0.9
    command:
      [
        "mongos",
        "--configdb", 
        "config_server/config-srv-repl:27017",
        "--bind_ip_all",
        "--port",
        "27018"
      ]
    healthcheck:
      test: [ "CMD", "mongo", "--eval", "db.adminCommand('ping')" ]
      interval: 5s
      start_period: 10s

  router2-repl:
