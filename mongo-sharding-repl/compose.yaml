      interval: 5s
      start_period: 10s

  mongo-sharding-repl:
    container_name: mongo-sharding-repl
    build: 
      context: api_app
      dockerfile: Dockerfile
    depends_on:
      - router1-repl
      - router2-repl
    ports:
      - 8080:8080
    networks:
      - app-repl-network
    environment:
      MONGODB_URL: "mongodb://router1-repl:27018,router2-repl:27019"
      MONGODB_DATABASE_NAME: "somedb"

networks:
  app-repl-network:
    driver: bridge
    ipam:
      driver: default
      config:
        - subnet: 173.18.0.0/16

volumes:
  config-data:
  shard1-1-data:
  shard1-2-data:
  shard1-3-data:
  shard2-1-data:
  shard2-2-data:
  shard2-3-data:
