name: mongo-sharding
services:

  router:
    container_name: router
    image: dh-mirror.gitverse.ru/mongo:latest
    volumes:
      - router_data_container:/data/db
    command:
      [
        "mongos", # запуск в режиме роутера
        "--configdb",
        "config_server/configSrv:27017", # передача данных сервера конфигурации
        "--bind_ip_all",
        "--port",
        "27020"
      ]
    ports:
      - 27020:27020
    networks:
      - mongo-sharding
    restart: always
    depends_on:
      - configSrv
      - shard-1
      - shard-2
    healthcheck:
      test: [ "CMD", "mongo", "--eval", "db.adminCommand('ping')" ]
      interval: 5s
      start_period: 10s

  configSrv:
    container_name: configSrv
    image: dh-mirror.gitverse.ru/mongo:latest
    volumes:
      - config_data_container:/data/db
    command:
      [
        "mongod",
        "--configsvr",  # запуск в режиме конфигурации
        "--replSet",
        "config_server",
        "--bind_ip_all",
        "--port",
        "27017"
      ]
    ports:
      - 27017:27017
    networks:
      - mongo-sharding
    restart: always
    healthcheck:
      test: [ "CMD", "mongo", "--eval", "db.adminCommand('ping')" ]
      interval: 5s
      start_period: 10s

  shard-1:
    container_name: shard-1
    image: dh-mirror.gitverse.ru/mongo:latest
    volumes:
      - shard1_data_container:/data/db
    command:
      [
        "mongod",
        "--shardsvr", # запуск в режиме шарда
        "--replSet",
        "shard-1",
        "--bind_ip_all",
        "--port",
        "27018" ]
    ports:
      - 27018:27018
    networks:
      - mongo-sharding
    restart: always
    healthcheck:
      test: [ "CMD", "mongo", "--eval", "db.adminCommand('ping')" ]
      interval: 5s
      start_period: 10s

  shard-2:
    container_name: shard-2
    image: dh-mirror.gitverse.ru/mongo:latest
    volumes:
      - shard2_data_container:/data/db
    command: [
      "mongod",
      "--shardsvr", # запуск в режиме шарда
      "--replSet",
      "shard-2",
      "--bind_ip_all",
      "--port",
      "27019"
    ]
    ports:
      - 27019:27019
    networks:
      - mongo-sharding
    restart: always
    healthcheck:
      test: [ "CMD", "mongo", "--eval", "db.adminCommand('ping')" ]
      interval: 5s
      start_period: 10s

  pymongo_api:
    container_name: pymongo_api
    build:
      context: ./
      dockerfile: Dockerfile
    depends_on:
      - router
    ports:
      - 8080:8080
    environment:
      MONGODB_URL: "mongodb://router:27020"
      MONGODB_DATABASE_NAME: "somedb"
    networks:
      - mongo-sharding
    restart: always


volumes:
  router_data_container:
    driver: local
  shard1_data_container:
    driver: local
  shard2_data_container:
    driver: local
  config_data_container:
    driver: local

networks:
  mongo-sharding:
    driver: bridge
