name: mongo-sharding

services:
  configsvr:
    container_name: configsvr
    image: dh-mirror.gitverse.ru/mongo:latest
    command: mongod --configsvr --replSet configReplSet --port 27017
    volumes:
      - configsvr_data:/data/db

  shard1:
    container_name: shard1
    image: dh-mirror.gitverse.ru/mongo:latest
    command: mongod --shardsvr --port 27017
    volumes:
      - shard1_data:/data/db

  shard2:
    container_name: shard2
    image: dh-mirror.gitverse.ru/mongo:latest
    command: mongod --shardsvr --port 27017
    volumes:
      - shard2_data:/data/db

  mongos_router:
    container_name: mongos_router
    image: dh-mirror.gitverse.ru/mongo:latest
    command: mongos --configdb configReplSet/configsvr:27017 --port 27017 --bind_ip_all
    depends_on:
      - configsvr
      - shard1
      - shard2

  pymongo_api:
    container_name: pymongo_api
    build:
      context: api_app
      dockerfile: Dockerfile
    depends_on:
      - mongos_router
    ports:
      - 8080:8080
    environment:
      MONGODB_URL: "mongodb://mongos_router:27017"
      MONGODB_DATABASE_NAME: "somedb"

volumes:
  configsvr_data:
  shard1_data:
  shard2_data:
