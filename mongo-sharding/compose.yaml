name: mongo-sharding

services:
  # Конфигурационный сервер
  configSrv:
    image: mongo:latest
    container_name: configSrv
    command: mongod --configsvr --replSet configSrv --port 27019 --bind_ip_all
    networks:
      - mongo-sharding-net

  # Шард 1 (реплика-сет rs1)
  shard1:
    image: mongo:latest
    container_name: shard1
    command: mongod --shardsvr --replSet rs1 --port 27018 --bind_ip_all
    networks:
      - mongo-sharding-net

  # Шард 2 (реплика-сет rs2)
  shard2:
    image: mongo:latest
    container_name: shard2
    command: mongod --shardsvr --replSet rs2 --port 27018 --bind_ip_all
    networks:
      - mongo-sharding-net

  # Роутер mongos
  mongos:
    image: mongo:latest
    container_name: mongos
    depends_on:
      - configSrv
      - shard1
      - shard2
    command: mongos --configdb configSrv/configSrv:27019 --bind_ip_all --port 27017
    ports:
      - "27017:27017"
    networks:
      - mongo-sharding-net

  # Приложение
  pymongo-api:
    build: ./api_app
    container_name: pymongo-api
    depends_on:
      - mongos
    ports:
      - "8080:8080"
    environment:
      MONGODB_URL: "mongodb://mongos:27017"
      MONGODB_DATABASE_NAME: "somedb"
    networks:
      - mongo-sharding-net

networks:
  mongo-sharding-net:
    driver: bridge