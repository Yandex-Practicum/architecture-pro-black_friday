name: mongo-sharding

services:
  configSrv:
    image: dh-mirror.gitverse.ru/mongo:latest
    container_name: configSrv
    restart: always
    command: mongod --configsvr --replSet config_server --bind_ip_all --port 27019
    volumes:
      - config_data:/data/db

  shard1:
    image: dh-mirror.gitverse.ru/mongo:latest
    container_name: shard1
    restart: always
    command: mongod --shardsvr --replSet shard1 --bind_ip_all --port 27018
    volumes:
      - shard1_data:/data/db

  shard2:
    image: dh-mirror.gitverse.ru/mongo:latest
    container_name: shard2
    restart: always
    command: mongod --shardsvr --replSet shard2 --bind_ip_all --port 27018
    volumes:
      - shard2_data:/data/db

  mongos_router:
    image: dh-mirror.gitverse.ru/mongo:latest
    container_name: mongos_router
    restart: always
    command: mongos --configdb config_server/configSrv:27019 --bind_ip_all --port 27017
    depends_on:
      - configSrv
      - shard1
      - shard2

  pymongo_api:
    image: kazhem/pymongo_api:1.0.0
    container_name: pymongo_api
    restart: always
    ports:
      - 8080:8080
    depends_on:
      - mongos_router
    environment:
      MONGODB_URL: "mongodb://mongos_router:27017"
      MONGODB_DATABASE_NAME: "somedb"

volumes:
  config_data:
  shard1_data:
  shard2_data:
