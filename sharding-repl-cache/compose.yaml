name: sharding-repl-cache

services:
  configSrv:
    image: mongo:7.0
    container_name: configSrv
    restart: always
    ports:
      - "27017:27017"
    networks:
      app-network:
        ipv4_address: 172.31.0.10
    volumes:
      - config-data:/data/db
    command:
      - "--configsvr"
      - "--replSet"
      - "config_server"
      - "--bind_ip_all"
      - "--port"
      - "27017"
    healthcheck:
      test: ["CMD", "mongosh", "--port", "27017", "--quiet", "--eval", "db.adminCommand('ping')"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 20s

  shard1-1:
    image: mongo:7.0
    container_name: shard1-1
    restart: always
    ports:
      - "27018:27018"
    networks:
      app-network:
        ipv4_address: 172.31.0.11
    volumes:
      - shard1-1-data:/data/db
    command:
      - "--shardsvr"
      - "--replSet"
      - "shard1"
      - "--bind_ip_all"
      - "--port"
      - "27018"
    healthcheck:
      test: ["CMD", "mongosh", "--port", "27018", "--quiet", "--eval", "db.adminCommand('ping')"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 20s

  shard1-2:
    image: mongo:7.0
    container_name: shard1-2
    restart: always
    ports:
      - "27021:27018"
    networks:
      app-network:
        ipv4_address: 172.31.0.12
    volumes:
      - shard1-2-data:/data/db
    command:
      - "--shardsvr"
      - "--replSet"
      - "shard1"
      - "--bind_ip_all"
      - "--port"
      - "27018"
    healthcheck:
      test: ["CMD", "mongosh", "--port", "27018", "--quiet", "--eval", "db.adminCommand('ping')"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 20s

  shard1-3:
    image: mongo:7.0
    container_name: shard1-3
    restart: always
    ports:
      - "27022:27018"
    networks:
      app-network:
        ipv4_address: 172.31.0.13
    volumes:
      - shard1-3-data:/data/db
    command:
      - "--shardsvr"
      - "--replSet"
      - "shard1"
      - "--bind_ip_all"
      - "--port"
      - "27018"
    healthcheck:
      test: ["CMD", "mongosh", "--port", "27018", "--quiet", "--eval", "db.adminCommand('ping')"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 20s

  shard2-1:
    image: mongo:7.0
    container_name: shard2-1
    restart: always
    ports:
      - "27019:27019"
    networks:
      app-network:
        ipv4_address: 172.31.0.14
    volumes:
      - shard2-1-data:/data/db
    command:
      - "--shardsvr"
      - "--replSet"
      - "shard2"
      - "--bind_ip_all"
      - "--port"
      - "27019"
    healthcheck:
      test: ["CMD", "mongosh", "--port", "27019", "--quiet", "--eval", "db.adminCommand('ping')"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 20s

  shard2-2:
    image: mongo:7.0
    container_name: shard2-2
    restart: always
    ports:
      - "27023:27019"
    networks:
      app-network:
        ipv4_address: 172.31.0.15
    volumes:
      - shard2-2-data:/data/db
    command:
      - "--shardsvr"
      - "--replSet"
      - "shard2"
      - "--bind_ip_all"
      - "--port"
      - "27019"
    healthcheck:
      test: ["CMD", "mongosh", "--port", "27019", "--quiet", "--eval", "db.adminCommand('ping')"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 20s

  shard2-3:
    image: mongo:7.0
    container_name: shard2-3
    restart: always
    ports:
      - "27024:27019"
    networks:
      app-network:
        ipv4_address: 172.31.0.16
    volumes:
      - shard2-3-data:/data/db
    command:
      - "--shardsvr"
      - "--replSet"
      - "shard2"
      - "--bind_ip_all"
      - "--port"
      - "27019"
    healthcheck:
      test: ["CMD", "mongosh", "--port", "27019", "--quiet", "--eval", "db.adminCommand('ping')"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 20s

  mongos_router:
    image: mongo:7.0
    container_name: mongos_router
    restart: always
    ports:
      - "27020:27020"
    networks:
      app-network:
        ipv4_address: 172.31.0.7
    command:
      - "mongos"
      - "--configdb"
      - "config_server/configSrv:27017"
      - "--bind_ip_all"
      - "--port"
      - "27020"
    depends_on:
      configSrv:
        condition: service_started
    healthcheck:
      test: ["CMD", "mongosh", "--port", "27020", "--quiet", "--eval", "db.adminCommand('ping')"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 30s

  redis:
    image: redis:7-alpine
    container_name: redis
    restart: always
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 3s
      timeout: 3s
      retries: 5
      start_period: 5s

  pymongo_api:
    build:
      context: api_app
      dockerfile: Dockerfile
    container_name: pymongo_api
    restart: always
    depends_on:
      configSrv:
        condition: service_started
      shard1-1:
        condition: service_started
      shard1-2:
        condition: service_started
      shard1-3:
        condition: service_started
      shard2-1:
        condition: service_started
      shard2-2:
        condition: service_started
      shard2-3:
        condition: service_started
      mongos_router:
        condition: service_started
      redis:
        condition: service_healthy
    ports:
      - "8080:8080"
    networks:
      - app-network
    environment:
      MONGODB_URL: "mongodb://mongos_router:27020"
      MONGODB_DATABASE_NAME: "somedb"
      SHARD1_REPL_URI: "mongodb://shard1-1:27018,shard1-2:27018,shard1-3:27018/?replicaSet=shard1"
      SHARD2_REPL_URI: "mongodb://shard2-1:27019,shard2-2:27019,shard2-3:27019/?replicaSet=shard2"
      REDIS_URL: "redis://redis:6379"

networks:
  app-network:
    driver: bridge
    ipam:
      driver: default
      config:
        - subnet: 172.31.0.0/16

volumes:
  config-data:
  shard1-1-data:
  shard1-2-data:
  shard1-3-data:
  shard2-1-data:
  shard2-2-data:
  shard2-3-data:
