name: mongo-sharding-repl-cache
services:
  configSrv:
    image: mongo:latest
    container_name: configSrv
    restart: always
    volumes:
      - config_data:/data/db
    command: [ "--configsvr", "--replSet", "config_server", "--port", "27017" ]
    ports:
      - "27017:27017"
    healthcheck:
      test: [ "CMD", "mongo", "--eval", "db.adminCommand('ping')" ]
      interval: 5s
      start_period: 10s
  shard1r1:
    image: mongo:latest
    container_name: shard1r1
    restart: always
    ports:
      - "27018:27018"
    volumes:
      - shard1r1_data:/data/db
    command: [ "--shardsvr", "--replSet", "shard1", "--port", "27018" ]
    healthcheck:
      test: [ "CMD", "mongo", "--eval", "db.adminCommand('ping')" ]
      interval: 5s
      start_period: 10s
  shard1r2:
    image: mongo:latest
    container_name: shard1r2
    restart: always
    ports:
      - "27021:27021"
    volumes:
      - shard1r2_data:/data/db
    command: [ "--shardsvr", "--replSet", "shard1", "--port", "27021" ]
    healthcheck:
      test: [ "CMD", "mongo", "--eval", "db.adminCommand('ping')" ]
      interval: 5s
      start_period: 10s
  shard1r3:
    image: mongo:latest
    container_name: shard1r3
    restart: always
    ports:
      - "27022:27022"
    volumes:
      - shard1r3_data:/data/db
    command: [ "--shardsvr", "--replSet", "shard1", "--port", "27022" ]
    healthcheck:
      test: [ "CMD", "mongo", "--eval", "db.adminCommand('ping')" ]
      interval: 5s
      start_period: 10s


  shard2r1:
    image: mongo:latest
    container_name: shard2r1
    restart: always
    ports:
      - "27019:27019"
    volumes:
      - shard2r1_data:/data/db
    command: [ "--shardsvr", "--replSet", "shard2", "--port", "27019" ]
    healthcheck:
      test: [ "CMD", "mongo", "--eval", "db.adminCommand('ping')" ]
      interval: 5s
      start_period: 10s

      
  shard2r2:
    image: mongo:latest
    container_name: shard2r2
    restart: always
    ports:
      - "27023:27023"
    volumes:
      - shard2r2_data:/data/db
    command: [ "--shardsvr", "--replSet", "shard2", "--port", "27023" ]
    healthcheck:
      test: [ "CMD", "mongo", "--eval", "db.adminCommand('ping')" ]
      interval: 5s
      start_period: 10s

  shard2r3:
    image: mongo:latest
    container_name: shard2r3
    restart: always
    ports:
      - "27024:27024"
    volumes:
      - shard2r3_data:/data/db
    command: [ "--shardsvr", "--replSet", "shard2", "--port", "27024" ]
    healthcheck:
      test: [ "CMD", "mongo", "--eval", "db.adminCommand('ping')" ]
      interval: 5s
      start_period: 10s

  mongos_router:
    image: mongo:latest
    container_name: mongos_router
    restart: always
    ports:
      - "27020:27020"
    command:
      [
        "mongos", 
        "--configdb", 
        "config_server/configSrv:27017", 
         --bind_ip_all,
        "--port",
        "27020"
      ]
    healthcheck:
      test: [ "CMD", "mongo", "--eval", "db.adminCommand('ping')" ]
      interval: 5s
      start_period: 10s

  pymongo_api:
    container_name: pymongo_api
    build:
      context: api_app
      dockerfile: Dockerfile
    depends_on:
      - mongos_router
      - redis_1
    ports:
      - 8080:8080
    environment:
      MONGODB_URL: "mongodb://mongos_router:27020"
      MONGODB_DATABASE_NAME: "somedb"
      REDIS_URL: "redis://redis_1:6379" 


  redis_1:
    image: "redis:latest"
    container_name: redis_1
    ports:
      - "6379"
    volumes:
      - redis_1_data:/data
      - ./redis/redis.conf:/usr/local/etc/redis/redis.conf
    command: [ "redis-server", "/usr/local/etc/redis/redis.conf" ]
  redis_2:
    image: "redis:latest"
    container_name: redis_2
    ports:
      - "6379"
    volumes:
      - redis_2_data:/data
      - ./redis/redis.conf:/usr/local/etc/redis/redis.conf
    command: [ "redis-server", "/usr/local/etc/redis/redis.conf" ]
  redis_3:
    image: "redis:latest"
    container_name: redis_3
    ports:
      - "6379"
    volumes:
      - redis_3_data:/data
      - ./redis/redis.conf:/usr/local/etc/redis/redis.conf
    command: [ "redis-server", "/usr/local/etc/redis/redis.conf" ]

  redis_4:
    image: "redis:latest"
    container_name: redis_4
    ports:
      - "6379"
    volumes:
      - redis_4_data:/data
      - ./redis/redis.conf:/usr/local/etc/redis/redis.conf
    command: [ "redis-server", "/usr/local/etc/redis/redis.conf" ]

  redis_5:
    image: "redis:latest"
    container_name: redis_5
    ports:
      - "6379"
    volumes:
      - redis_5_data:/data
      - ./redis/redis.conf:/usr/local/etc/redis/redis.conf
    command: [ "redis-server", "/usr/local/etc/redis/redis.conf" ]

  redis_6:
    image: "redis:latest"
    container_name: redis_6
    ports:
      - "6379"
    volumes:
      - redis_6_data:/data
      - ./redis/redis.conf:/usr/local/etc/redis/redis.conf
    command: [ "redis-server", "/usr/local/etc/redis/redis.conf" ]

volumes:
  mongodb1_data_container:
  config_data:
  shard1r1_data:
  shard1r2_data:
  shard1r3_data:
  shard2r1_data:
  shard2r2_data:
  shard2r3_data:
  redis_1_data: 
  redis_2_data: 
  redis_3_data: 
  redis_4_data: 
  redis_5_data: 
  redis_6_data: 

