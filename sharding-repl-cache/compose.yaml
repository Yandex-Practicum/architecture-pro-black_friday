name: sharding-repl-cache

services:
  # Redis Cache
  redis:
    container_name: redis
    image: dh-mirror.gitverse.ru/redis:latest
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  # Config Server Replica Set
  configsvr1:
    container_name: configsvr1
    image: dh-mirror.gitverse.ru/mongo:latest
    command: mongod --configsvr --replSet configReplSet --port 27017 --bind_ip_all
    volumes:
      - configsvr1_data:/data/db

  configsvr2:
    container_name: configsvr2
    image: dh-mirror.gitverse.ru/mongo:latest
    command: mongod --configsvr --replSet configReplSet --port 27017 --bind_ip_all
    volumes:
      - configsvr2_data:/data/db

  configsvr3:
    container_name: configsvr3
    image: dh-mirror.gitverse.ru/mongo:latest
    command: mongod --configsvr --replSet configReplSet --port 27017 --bind_ip_all
    volumes:
      - configsvr3_data:/data/db

  # Shard 1 Replica Set (3 members)
  shard1a:
    container_name: shard1a
    image: dh-mirror.gitverse.ru/mongo:latest
    command: mongod --shardsvr --replSet shard1ReplSet --port 27017 --bind_ip_all
    volumes:
      - shard1a_data:/data/db

  shard1b:
    container_name: shard1b
    image: dh-mirror.gitverse.ru/mongo:latest
    command: mongod --shardsvr --replSet shard1ReplSet --port 27017 --bind_ip_all
    volumes:
      - shard1b_data:/data/db

  shard1c:
    container_name: shard1c
    image: dh-mirror.gitverse.ru/mongo:latest
    command: mongod --shardsvr --replSet shard1ReplSet --port 27017 --bind_ip_all
    volumes:
      - shard1c_data:/data/db

  # Shard 2 Replica Set (3 members)
  shard2a:
    container_name: shard2a
    image: dh-mirror.gitverse.ru/mongo:latest
    command: mongod --shardsvr --replSet shard2ReplSet --port 27017 --bind_ip_all
    volumes:
      - shard2a_data:/data/db

  shard2b:
    container_name: shard2b
    image: dh-mirror.gitverse.ru/mongo:latest
    command: mongod --shardsvr --replSet shard2ReplSet --port 27017 --bind_ip_all
    volumes:
      - shard2b_data:/data/db

  shard2c:
    container_name: shard2c
    image: dh-mirror.gitverse.ru/mongo:latest
    command: mongod --shardsvr --replSet shard2ReplSet --port 27017 --bind_ip_all
    volumes:
      - shard2c_data:/data/db

  # Mongos Router
  mongos:
    container_name: mongos
    image: dh-mirror.gitverse.ru/mongo:latest
    command: mongos --configdb configReplSet/configsvr1:27017,configsvr2:27017,configsvr3:27017 --bind_ip_all --port 27017
    depends_on:
      - configsvr1
      - configsvr2
      - configsvr3
      - shard1a
      - shard1b
      - shard1c
      - shard2a
      - shard2b
      - shard2c
    ports:
      - "27017:27017"

  pymongo_api:
    container_name: pymongo_api
    build: 
      context: api_app
      dockerfile: Dockerfile
    depends_on:
      - mongos
      - redis
    ports:
      - 8080:8080
    environment:
      MONGODB_URL: "mongodb://mongos:27017"
      MONGODB_DATABASE_NAME: "somedb"
      REDIS_URL: "redis://redis:6379"


volumes:
  redis_data:
  configsvr1_data:
  configsvr2_data:
  configsvr3_data:
  shard1a_data:
  shard1b_data:
  shard1c_data:
  shard2a_data:
  shard2b_data:
  shard2c_data:
