services:
  config-srv-repl-cache:
    image: dh-mirror.gitverse.ru/mongo:latest
    container_name: config-srv-repl-cache
    restart: always
    ports:
      - "27017:27017"
    networks:
      app-repl-cache-network:
        ipv4_address: 173.19.0.8
    volumes:
      - config-data:/data/db
    command:
      [
        "--configsvr",
        "--replSet",
        "config_server",
        "--bind_ip_all",
        "--port",
        "27017"
      ] 
    healthcheck:
      test: [ "CMD", "mongo", "--eval", "db.adminCommand('ping')" ]
      interval: 5s
      start_period: 10s
  
  router1-repl-cache:
    image: dh-mirror.gitverse.ru/mongo:latest
    container_name: router1-repl-cache
    restart: always
    ports:
      - "27018:27018"
    networks:
      app-repl-cache-network:
        ipv4_address: 173.19.0.9
    command:
      [
        "mongos",
        "--configdb", 
        "config_server/config-srv-repl-cache:27017",
        "--bind_ip_all",
        "--port",
        "27018"
      ]
    healthcheck:
      test: [ "CMD", "mongo", "--eval", "db.adminCommand('ping')" ]
      interval: 5s
      start_period: 10s

  router2-repl-cache:
    image: dh-mirror.gitverse.ru/mongo:latest
    container_name: router2-repl-cache
    restart: always
    ports:
      - "27019:27019"
    networks:
      app-repl-cache-network:
        ipv4_address: 173.19.0.10
    command:
      [
        "mongos",
        "--configdb", 
        "config_server/config-srv-repl-cache:27017",
        "--bind_ip_all",
        "--port",
        "27019"
      ]
    healthcheck:
      test: [ "CMD", "mongo", "--eval", "db.adminCommand('ping')" ]
      interval: 5s
      start_period: 10s

  shard1-1c:
    image: dh-mirror.gitverse.ru/mongo:latest
    container_name: shard1-1c
    restart: always
    ports:
      - "27020:27020"
    networks:
      app-repl-cache-network:
        ipv4_address: 173.19.0.11
    volumes:
      - shard1-1-data:/data/db
    command:
      [
        "--shardsvr",
        "--replSet",
        "shard1",
        "--bind_ip_all",
        "--port",
        "27020"
      ]
    healthcheck:
      test: [ "CMD", "mongo", "--eval", "db.adminCommand('ping')" ]
      interval: 5s
      start_period: 10s
    
  shard1-2c:
    image: dh-mirror.gitverse.ru/mongo:latest
    container_name: shard1-2c
    restart: always
    ports:
      - "27021:27021"
    networks:
      app-repl-cache-network:
        ipv4_address: 173.19.0.12
    volumes:
      - shard1-2-data:/data/db
    command:
      [
        "--shardsvr",
        "--replSet",
        "shard1",
        "--bind_ip_all",
        "--port",
        "27021"
      ]
    healthcheck:
      test: [ "CMD", "mongo", "--eval", "db.adminCommand('ping')" ]
      interval: 5s
      start_period: 10s

  shard1-3c:
    image: dh-mirror.gitverse.ru/mongo:latest
    container_name: shard1-3c
    restart: always
    ports:
      - "27022:27022"
    networks:
      app-repl-cache-network:
        ipv4_address: 173.19.0.13
    volumes:
      - shard1-3-data:/data/db
    command:
      [
        "--shardsvr",
        "--replSet",
        "shard1",
        "--bind_ip_all",
