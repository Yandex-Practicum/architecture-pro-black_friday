name: sharding-repl-cache

services:
  configSrv:
    image: dh-mirror.gitverse.ru/mongo:latest
    container_name: configSrv
    restart: always
    command: mongod --configsvr --replSet config_server --port 27019
    volumes:
      - config-data:/data/db

  shard1-1:
    image: dh-mirror.gitverse.ru/mongo:latest
    container_name: shard1-1
    restart: always
    command: mongod --shardsvr --replSet shard1 --port 27018
    volumes:
      - shard1-1-data:/data/db

  shard1-2:
    image: dh-mirror.gitverse.ru/mongo:latest
    container_name: shard1-2
    restart: always
    command: mongod --shardsvr --replSet shard1 --port 27018
    volumes:
      - shard1-2-data:/data/db

  shard1-3:
    image: dh-mirror.gitverse.ru/mongo:latest
    container_name: shard1-3
    restart: always
    command: mongod --shardsvr --replSet shard1 --port 27018
    volumes:
      - shard1-3-data:/data/db

  shard2-1:
    image: dh-mirror.gitverse.ru/mongo:latest
    container_name: shard2-1
    restart: always
    command: mongod --shardsvr --replSet shard2 --port 27018
    volumes:
      - shard2-1-data:/data/db

  shard2-2:
    image: dh-mirror.gitverse.ru/mongo:latest
    container_name: shard2-2
    restart: always
    command: mongod --shardsvr --replSet shard2 --port 27018
    volumes:
      - shard2-2-data:/data/db

  shard2-3:
    image: dh-mirror.gitverse.ru/mongo:latest
    container_name: shard2-3
    restart: always
    command: mongod --shardsvr --replSet shard2 --port 27018
    volumes:
      - shard2-3-data:/data/db

  mongos_router:
    image: dh-mirror.gitverse.ru/mongo:latest
    container_name: mongos_router
    restart: always
    command: mongos --configdb config_server/configSrv:27019 --port 27017 --bind_ip_all
    depends_on:
      - configSrv
      - shard1-1
      - shard1-2
      - shard1-3
      - shard2-1
      - shard2-2
      - shard2-3

  redis:
    image: redis:latest
    container_name: redis
    restart: always
    ports:
      - 6379:6379

  pymongo_api:
    container_name: pymongo_api
    image: kazhem/pymongo_api:1.0.0
    depends_on:
      - mongos_router
      - redis
    ports:
      - 8080:8080
    environment:
      MONGODB_URL: "mongodb://mongos_router:27017"
      MONGODB_DATABASE_NAME: "somedb"
      REDIS_URL: "redis://redis:6379"

volumes:
  config-data:
  shard1-1-data:
  shard1-2-data:
  shard1-3-data:
  shard2-1-data:
  shard2-2-data:
  shard2-3-data:
