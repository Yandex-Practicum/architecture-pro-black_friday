  shard2-1c:
    image: dh-mirror.gitverse.ru/mongo:latest
    container_name: shard2-1c
    restart: always
    ports:
      - "27023:27023"
    networks:
      app-repl-cache-network:
        ipv4_address: 173.19.0.14
    volumes:
      - shard2-1-data:/data/db
    command:
      [
        "--shardsvr",
