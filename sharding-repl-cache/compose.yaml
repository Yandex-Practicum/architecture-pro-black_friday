        "27023"
      ]
    healthcheck:
      test: [ "CMD", "mongo", "--eval", "db.adminCommand('ping')" ]
      interval: 5s
      start_period: 10s

  shard2-2c:
    image: dh-mirror.gitverse.ru/mongo:latest
    container_name: shard2-2c
    restart: always
    ports:
      - "27024:27024"
    networks:
      app-repl-cache-network:
        ipv4_address: 173.19.0.15
    volumes:
      - shard2-2-data:/data/db
    command:
      [
        "--shardsvr",
        "--replSet",
        "shard2",
        "--bind_ip_all",
        "--port",
        "27024"
      ]
    healthcheck:
      test: [ "CMD", "mongo", "--eval", "db.adminCommand('ping')" ]
      interval: 5s
      start_period: 10s

  shard2-3c:
    image: dh-mirror.gitverse.ru/mongo:latest
    container_name: shard2-3c
    restart: always
    ports:
      - "27025:27025"
    networks:
      app-repl-cache-network:
        ipv4_address: 173.19.0.16
    volumes:
      - shard2-3-data:/data/db
    command:
      [
        "--shardsvr",
        "--replSet",
        "shard2",
        "--bind_ip_all",
        "--port",
        "27025"
      ]
    healthcheck:
      test: [ "CMD", "mongo", "--eval", "db.adminCommand('ping')" ]
      interval: 5s
      start_period: 10s

  sharding-repl-cache:
    container_name: sharding-repl-cache
    build: 
      context: api_app
      dockerfile: Dockerfile
    depends_on:
      - router1-repl-cache
      - router2-repl-cache
    ports:
      - 8080:8080
    networks:
      - app-repl-cache-network
    environment:
      MONGODB_URL: "mongodb://router1-repl-cache:27018,router2-repl-cache:27019"
      MONGODB_DATABASE_NAME: "somedb"
      REDIS_URL: "redis://redis:6379"

  redis:
    image: redis:latest
    container_name: redis
    ports:
      - 6379:6379
    volumes:
      - redis-data:/data
    entrypoint: redis-server --appendonly yes
    networks:
      app-repl-cache-network:
        ipv4_address: 173.19.0.7
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 10s
      retries: 5

networks:
  app-repl-cache-network:
    driver: bridge
    ipam:
      driver: default
      config:
        - subnet: 173.19.0.0/16

volumes:
  config-data:
  shard1-1-data:
  shard1-2-data:
  shard1-3-data:
  shard2-1-data:
  shard2-2-data:
  shard2-3-data:
  redis-data:
