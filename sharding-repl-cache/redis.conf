# Redis configuration for MongoDB cache
bind 0.0.0.0
port 6379

# Persistence
appendonly yes
appendfsync everysec
dir /data

# Memory management
maxmemory 512mb
maxmemory-policy allkeys-lru

# Performance
tcp-keepalive 300
timeout 0
tcp-backlog 511

# Security
protected-mode no

# Logging
loglevel notice
logfile ""

# Slow log
slowlog-log-slower-than 10000
slowlog-max-len 128

# Clients
maxclients 10000

# Databases
databases 16

# Replication (if needed in future)
# replicaof <masterip> <masterport>