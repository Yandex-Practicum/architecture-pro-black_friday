    command:
      [
        "--shardsvr",
        "--replSet",
        "shard1",
        "--bind_ip_all",
        "--port",
        "27018"
      ]
    healthcheck:
      test: [ "CMD", "mongosh", "--port", "27018", "--eval", "db.adminCommand('ping')" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  shard1_secondary2:
    image: mongo:latest
    container_name: shard1_secondary2
    restart: always
    ports:
      - "27038:27018"
    networks:
      app-network:
